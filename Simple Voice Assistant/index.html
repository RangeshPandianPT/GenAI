<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant</title>
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            text-align: center; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { margin-top: 40px; color: #38bdf8; }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }
        #record-btn { 
            padding: 16px 36px; 
            font-size: 18px; 
            font-weight: 600;
            border-radius: 50px; 
            border: none; 
            background: #3b82f6; 
            color: white; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 20px 0;
        }
        #record-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        #record-btn.recording { 
            background: #ef4444; 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }
        .chat-box { 
            margin: 30px 0; 
            text-align: left; 
            background: #1e293b; 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid #334155;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .message { margin-bottom: 20px; line-height: 1.5; }
        .message strong { display: block; margin-bottom: 5px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.05em; }
        .user-msg strong { color: #94a3b8; }
        .user-msg { color: #e2e8f0; }
        .ai-msg strong { color: #10b981; }
        .ai-msg { color: #f1f5f9; }
        #status { font-style: italic; color: #94a3b8; margin-top: 10px; height: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Voice Assistant</h1>
        <button id="record-btn">Start Recording</button>
        <div id="status">Ready</div>
        <div class="chat-box" id="chat-box"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
